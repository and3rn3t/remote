name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build & Test job is disabled until Xcode 26 is available on GitHub Actions runners.
  # The macos-15 runners only ship Xcode 16.x, but this project requires Xcode 26 (iOS 26 SDK).
  # Uncomment and update when a runner with Xcode 26 becomes available.
