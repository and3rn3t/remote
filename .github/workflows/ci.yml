name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project remote/remote.xcodeproj \
            -scheme remote \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Install iOS Simulator Runtime
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Test with Coverage
        run: |
          xcodebuild test \
            -project remote/remote.xcodeproj \
            -scheme remote \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -enableCodeCoverage YES \
            -derivedDataPath ./DerivedData \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Generate Coverage Report
        run: |
          XCRESULT=$(find ./DerivedData/Logs/Test -name '*.xcresult' | head -1)
          if [ -n "$XCRESULT" ]; then
            xcrun xccov view --report --json "$XCRESULT" > coverage.json
            echo "📊 Code Coverage Summary:"
            xcrun xccov view --report "$XCRESULT" | grep -A 9999 "^remote.app" || true
          else
            echo "No xcresult bundle found — skipping coverage report"
          fi

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: coverage.json

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
