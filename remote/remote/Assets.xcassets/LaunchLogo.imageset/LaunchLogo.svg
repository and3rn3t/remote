<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4A9EF5"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Power symbol ring -->
  <circle cx="100" cy="92" r="52" fill="none" stroke="url(#glow)" stroke-width="9" stroke-linecap="round"
          stroke-dasharray="262" stroke-dashoffset="41"/>
  <!-- Power symbol line -->
  <line x1="100" y1="46" x2="100" y2="82" stroke="url(#glow)" stroke-width="9" stroke-linecap="round"/>

  <!-- Sound waves - left -->
  <path d="M34 76 Q24 92 34 108" fill="none" stroke="#4A9EF5" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M20 62 Q6 92 20 122" fill="none" stroke="#4A9EF5" stroke-width="4.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Sound waves - right -->
  <path d="M166 76 Q176 92 166 108" fill="none" stroke="#4A9EF5" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M180 62 Q194 92 180 122" fill="none" stroke="#4A9EF5" stroke-width="4.5" stroke-linecap="round" opacity="0.35"/>

  <!-- App name -->
  <text x="100" y="172" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="22" font-weight="600" fill="#2563EB" letter-spacing="3">REMOTE</text>
  <text x="100" y="192" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, Arial, sans-serif"
        font-size="10" font-weight="400" fill="#6BA3E8" letter-spacing="2">DENON</text>
</svg>
