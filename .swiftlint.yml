# SwiftLint Configuration for Denon Remote

excluded:
  - DerivedData
  - .build
  - .swiftpm
  - remote/.build
  - remote/remote.xcodeproj
  - remote/build

# Rule configuration
line_length:
  warning: 160
  error: 200
  ignores_urls: true
  ignores_comments: true

type_body_length:
  warning: 1200
  error: 1500

file_length:
  warning: 1500
  error: 2000

function_body_length:
  warning: 100
  error: 150

cyclomatic_complexity:
  warning: 20
  error: 25

function_parameter_count:
  warning: 10
  error: 12

type_name:
  excluded:
    - remoteApp
    - remoteUITests
    - remoteUITestsLaunchTests
    - remoteWidgetsBundle

identifier_name:
  min_length: 2
  excluded:
    - db
    - on
    - id

# Enabled rules
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - first_where
  - flatmap_over_map_reduce
  - last_where
  - modifier_order
  - overridden_super_call
  - prefer_self_in_static_references
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces

# Disabled rules
disabled_rules:
  - todo
  - trailing_comma
